<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Tushkuna - Mozo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { background-color: #f8efe9; }
        .header { background-color: #a26433; }
        .mesa-libre { border-left: 5px solid #28a745; }
        .mesa-ocupada { border-left: 5px solid #dc3545; }
    </style>
</head>
<body>

<header class="header d-flex justify-content-between align-items-center px-4 py-3 shadow-sm">
    <h1 class="text-white fw-semibold fs-5 mb-0">Tushkuna - Mozo</h1>
    <form th:action="@{/logout}" method="post">

        <button type="submit" class="btn btn-light btn-sm">
            Cerrar sesión
        </button>
    </form>
</header>

<div class="container py-4">
    <p class="text-muted">
        Usuario: <strong th:text="${nombre}"></strong>
        (<span th:text="${usuario}"></span>)
    </p>

    <div class="row g-4">

        <!-- MESAS -->
        <div class="col-md-7">
            <h4 class="fw-bold mb-3" style="color: #a26433;">Mesas</h4>
            <div class="row g-3">
                <div class="col-6 col-md-4" th:each="mesa : ${mesas}">
                    <div class="card shadow-sm p-3 text-center"
                         th:classappend="${mesa.estado == 'libre'} ? 'mesa-libre' : 'mesa-ocupada'">
                        <h5 class="fw-semibold" style="color: #885f56;">
                            Mesa <span th:text="${mesa.numero}"></span>
                        </h5>
                        <span class="badge mb-2"
                              th:classappend="${mesa.estado == 'libre'} ? 'bg-success' : 'bg-danger'"
                              th:text="${mesa.estado}">
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- FORMULARIO NUEVO PEDIDO -->
        <div class="col-md-5">
            <h4 class="fw-bold mb-3" style="color: #a26433;">Nuevo Pedido</h4>
            <div class="card shadow-sm p-4">

                <form th:action="@{/tushkuna/mozo/pedido}" method="post"
                      th:object="${pedidoForm}">


                    <!-- Mesa -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Numero de Mesa</label>
                        <select class="form-select" th:field="*{mesaNumero}">
                            <option value="">Seleccionar mesa...</option>
                            <option th:each="mesa : ${mesas}"
                                    th:value="${mesa.numero}"
                                    th:text="'Mesa ' + ${mesa.numero} + ' - ' + ${mesa.estado}"
                                    th:disabled="${mesa.estado == 'ocupada'}">
                            </option>
                        </select>
                        <div class="text-danger small"
                             th:if="${#fields.hasErrors('mesaNumero')}"
                             th:errors="*{mesaNumero}"></div>
                    </div>

                    <!-- Descripcion -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Descripcion del Pedido</label>
                        <textarea class="form-control" rows="3"
                                  th:field="*{descripcion}"
                                  placeholder="Ej: 2 pollos a la brasa, 1 chicha"></textarea>
                        <div class="text-danger small"
                             th:if="${#fields.hasErrors('descripcion')}"
                             th:errors="*{descripcion}"></div>
                    </div>

                    <!-- Total -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Total (S/)</label>
                        <input type="number" step="0.01" class="form-control"
                               th:field="*{total}"
                               placeholder="0.00"/>
                        <div class="text-danger small"
                             th:if="${#fields.hasErrors('total')}"
                             th:errors="*{total}"></div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn text-white fw-semibold"
                                style="background-color: #cd8350;">
                            Enviar Pedido a Cocina
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
