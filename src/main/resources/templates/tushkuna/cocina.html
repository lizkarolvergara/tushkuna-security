<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Tushkuna - Cocina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { background-color: #f8efe9; }
        .header { background-color: #a26433; }
    </style>
</head>
<body>

<header class="header d-flex justify-content-between align-items-center px-4 py-3 shadow-sm">
    <h1 class="text-white fw-semibold fs-5 mb-0">Tushkuna - Cocina</h1>
    <form th:action="@{/logout}" method="post">

        <button type="submit" class="btn btn-light btn-sm">
            Cerrar sesión
        </button>
    </form>
</header>

<div class="container py-4">
    <p class="text-muted">
        Usuario: <strong th:text="${nombre}"></strong>
        (<span th:text="${usuario}"></span>)
    </p>

    <div class="row g-4">

        <!-- PEDIDOS EN COCINA -->
        <div class="col-md-6">
            <h4 class="fw-bold mb-3" style="color: #885f56;">Pedidos EN COCINA</h4>

            <div th:if="${#lists.isEmpty(pedidosEnCocina)}">
                <p class="text-muted">No hay pedidos en cocina.</p>
            </div>

            <div class="card shadow-sm mb-3 p-3"
                 th:each="pedido : ${pedidosEnCocina}">
                <h6 class="fw-bold">Mesa <span th:text="${pedido.mesaNumero}"></span></h6>
                <p class="mb-1">Mozo: <strong th:text="${pedido.mozo}"></strong></p>
                <p class="mb-1">Pedido: <span th:text="${pedido.descripcion}"></span></p>
                <p class="mb-2">Total: <strong>S/ <span th:text="${pedido.total}"></span></strong></p>

                <form th:action="@{/tushkuna/cocina/listo/{id}(id=${pedido.idpedido})}"
                      method="post">

                    <button type="submit" class="btn btn-success btn-sm">
                        Marcar como Listo
                    </button>
                </form>
            </div>
        </div>

        <!-- PEDIDOS LISTOS -->
        <div class="col-md-6">
            <h4 class="fw-bold mb-3" style="color: #a26433;">Pedidos LISTOS</h4>

            <div th:if="${#lists.isEmpty(pedidosListos)}">
                <p class="text-muted">No hay pedidos listos.</p>
            </div>

            <div class="card shadow-sm mb-3 p-3"
                 th:each="pedido : ${pedidosListos}">
                <h6 class="fw-bold">Mesa <span th:text="${pedido.mesaNumero}"></span></h6>
                <p class="mb-1">Mozo: <strong th:text="${pedido.mozo}"></strong></p>
                <p class="mb-1">Pedido: <span th:text="${pedido.descripcion}"></span></p>
                <p class="mb-0">Total: <strong>S/ <span th:text="${pedido.total}"></span></strong></p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
