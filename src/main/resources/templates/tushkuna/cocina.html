<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Tushkuna - Cocina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { background-color: #f8efe9; }
        .header { background-color: #a26433; }
    </style>
</head>
<body>

<header class="header d-flex justify-content-between align-items-center px-4 py-3 shadow-sm">
    <h1 class="text-white fw-semibold fs-5 mb-0">Cocina</h1>
    <form th:action="@{/logout}" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-light btn-sm">
            Cerrar sesión
        </button>
    </form>
</header>

<div class="container py-5">
    <h2 class="fw-bold mb-1" style="color: #885f56;">Pedidos en Cocina</h2>
    <p class="text-muted mb-4">
        Usuario: <strong th:text="${nombre}"></strong>
        (<span th:text="${usuario}"></span>)
    </p>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold" style="color: #885f56;">
                    Pedidos EN COCINA
                </div>
                <div class="card-body">
                    <p class="text-muted">No hay pedidos en cocina.</p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold" style="color: #a26433;">
                    Pedidos EN PREPARACION
                </div>
                <div class="card-body">
                    <p class="text-muted">No hay pedidos en preparación.</p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
