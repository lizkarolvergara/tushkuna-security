<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Tushkuna - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { background-color: rgba(205, 131, 80, 0.10); }
        .navbar-tushkuna { background-color: #a26433; }
        .card-rol { border-left: 5px solid #cd8350; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-tushkuna shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold text-white">Tushkuna</span>
        <div class="ms-auto">
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-light btn-sm">
                    Cerrar sesión
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow border-0 rounded-4 card-rol">
        <div class="card-body p-4">
            <h2 class="fw-bold" style="color: #a26433;">
                ¡Bienvenido, <span th:text="${nombre}"></span>!
            </h2>
            <p class="lead mt-2">
                Email: <strong th:text="${email}"></strong>
            </p>
            <p class="lead">
                Rol: <span class="badge bg-warning text-dark"
                           th:text="${rol}"></span>
            </p>
        </div>
    </div>
</div>

</body>
</html>
