<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Tushkuna - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        body { background-color: rgba(205, 131, 80, 0.10); }
        .btn-tushkuna { background-color: #cd8350; color: white; border: none; }
        .btn-tushkuna:hover { background-color: #a26433; color: white; }
        .card { border-top: 4px solid #a26433; }
        .titulo { color: #a26433; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center align-items-center vh-100">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">

                    <h3 class="text-center mb-4 fw-bold titulo">
                        Tushkuna
                    </h3>

                    <!-- Mensajes -->
                    <div th:if="${infoMsg}" class="alert alert-success"
                         th:text="${infoMsg}"></div>
                    <div th:if="${errorMsg}" class="alert alert-danger"
                         th:text="${errorMsg}"></div>

                    <form th:action="@{/auth/login}" method="post"
                          th:object="${form}">

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>

                        <!-- Usuario -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Usuario</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{username}"
                                   placeholder="Ingrese su usuario"
                                   maxlength="50">
                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('username')}"
                                 th:errors="*{username}"></div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contraseña</label>
                            <input type="password"
                                   class="form-control"
                                   th:field="*{password}"
                                   placeholder="Ingrese su contraseña"
                                   maxlength="50">
                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}"></div>
                        </div>

                        <!-- reCAPTCHA -->
                        <div class="mb-3 text-center">
                            <div class="g-recaptcha"
                                 th:attr="data-sitekey=${recaptchaSiteKey}">
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-tushkuna btn-lg rounded-3">
                                Ingresar
                            </button>
                            <a th:href="@{/auth/registrar}"
                               class="btn btn-outline-secondary rounded-3">
                                Registrarse
                            </a>
                        </div>

                    </form>
                </div>
            </div>
            <div class="text-center mt-3 text-muted small">
                © 2026 Tushkuna - IDAT
            </div>
        </div>
    </div>
</div>
</body>
</html>
