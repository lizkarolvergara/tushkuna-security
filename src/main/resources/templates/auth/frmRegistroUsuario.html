<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Tushkuna - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { background-color: rgba(205, 131, 80, 0.10); }
        .btn-tushkuna { background-color: #cd8350; color: white; border: none; }
        .btn-tushkuna:hover { background-color: #a26433; color: white; }
        .card { border-top: 4px solid #a26433; }
        .titulo { color: #a26433; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center align-items-center vh-100">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">

                    <h3 class="text-center mb-4 fw-bold titulo">
                        Registro de Usuario
                    </h3>

                    <form th:action="@{/auth/guardarUsuario}"
                          method="post"
                          th:object="${usuario}">

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombres</label>
                            <input type="text" class="form-control"
                                   th:field="*{nombres}"
                                   placeholder="Nombres" maxlength="100">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Apellidos</label>
                            <input type="text" class="form-control"
                                   th:field="*{apellidos}"
                                   placeholder="Apellidos" maxlength="100">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Usuario</label>
                            <input type="text" class="form-control"
                                   th:field="*{nomusuario}"
                                   placeholder="Nombre de usuario" maxlength="50">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control"
                                   th:field="*{email}"
                                   placeholder="correo@tushkuna.com" maxlength="100">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contraseña</label>
                            <input type="password" class="form-control"
                                   th:field="*{password}"
                                   placeholder="Mínimo 8 caracteres" maxlength="50">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-tushkuna btn-lg rounded-3">
                                Registrar
                            </button>
                            <a th:href="@{/auth/login}"
                               class="btn btn-outline-secondary rounded-3">
                                Volver al Login
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
